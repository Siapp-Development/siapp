name: "Copilot Setup Steps"

# Run automatically when this file changes (validates the setup works),
# and allow manual runs from the Actions tab.
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # Must be named exactly `copilot-setup-steps` to be picked up by Copilot.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              # version is resolved from the "packageManager" field in package.json

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  # Single source of truth for the Node version (pnpm 11 needs >= 22.13)
                  node-version-file: ".nvmrc"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile
